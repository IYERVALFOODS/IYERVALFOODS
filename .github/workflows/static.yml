    function placeOrder(event) {
      event.preventDefault();
      if (!cart.length) return;
      const formData = new FormData(checkoutForm);
    function buildOrder(formData, paymentStatus = "pending") {
      const timestamp = Date.now();
      const order = {
      return {
        orderId: `IYF-${timestamp}`,
        name: formData.get("name").toString().trim(),
        phone: formData.get("phone").toString().trim(),
        notes: formData.get("notes").toString().trim(),
        items: cart.map((item) => ({ id: item.id, name: item.name, price: item.price, quantity: item.quantity })),
        total: getCartTotal(),
        paymentStatus,
        timestamp
      };
    }

    function finalizeOrder(order) {
      orders.push(order);
      saveState(STORAGE_KEYS.orders, orders);
      cart = [];
      adminPanel.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function startRazorpayPayment() {
      if (!cart.length) return;
      const formData = new FormData(checkoutForm);
      const customerName = formData.get("name").toString().trim();
      const customerPhone = formData.get("phone").toString().trim();
      const customerAddress = formData.get("address").toString().trim();

      if (!customerName || !customerPhone || !customerAddress) {
        checkoutForm.reportValidity();
        return;
      }

      if (typeof Razorpay === "undefined") {
        alert("Razorpay failed to load. Try again.");
        return;
      }

      const totalAmount = getCartTotal();
      const orderDraft = buildOrder(formData, "paid");

      const options = {
        key: "YOUR_RAZORPAY_KEY",
        amount: totalAmount * 100,
        currency: "INR",
        name: "IYERVAL FOODS",
        description: "Order Payment",
        handler: function (response) {
          orderDraft.paymentStatus = "paid";
          orderDraft.razorpayPaymentId = response.razorpay_payment_id || "";
          finalizeOrder(orderDraft);
          alert("Payment successful!");
        },
        prefill: {
          name: customerName,
          contact: customerPhone
        },
        theme: {
          color: "#ff8c00"
        }
      };

      const razorpay = new Razorpay(options);
      razorpay.on("payment.failed", function () {
        alert("Payment failed. Try again.");
      });
      razorpay.open();
    }

    function placeOrder(event) {
      event.preventDefault();
      if (!cart.length) return;
      const formData = new FormData(checkoutForm);
      const order = buildOrder(formData, "unpaid");

      if (!order.name || !order.phone || !order.address) {
        checkoutForm.reportValidity();
        return;
      }

      finalizeOrder(order);
    }

    function toggleAdminPanel() {
      adminPanel.classList.toggle("visible");
      renderOrders();
      closeCheckoutBtn.addEventListener("click", closeCheckout);
      closeConfirmationBtn.addEventListener("click", closeConfirmation);
      continueBrowsingBtn.addEventListener("click", closeConfirmation);
